<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
  <title>Nimnadi | Contact</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="images/89.1.png">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <h1 class="logo">nimnadi</h1>
  <button class="hamburger" aria-label="Toggle menu">
    <span></span>
    <span></span>
    <span></span>
  </button>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="project.html">Projects</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main>

<!-- HERO -->
<section class="hero contact-hero">
  <h1 class="bg-text">CONTACT</h1>
  <div class="hero-content">
    <p class="handwritten">let's work together ✦</p>
    <h2>get in touch with me</h2>
  </div>
</section>

<!-- CONTACT FORM -->
<section class="contact-section">
  <form class="contact-form">
    <div class="form-group">
      <label>Your Name</label>
      <input type="text" placeholder="enter your name" required>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" placeholder="enter your email" required>
    </div>
    <div class="form-group">
      <label>Message</label>
      <textarea placeholder="write your message..."></textarea>
    </div>
    <button type="submit">send message ✦</button>
  </form>
</section>

</main>

<footer>
  <h2>talk soon ♡</h2>
  <p>&copy; 2026 Nimnadi</p>
</footer>

<script>
  document.querySelector('.hamburger').addEventListener('click', function () {
    document.querySelector('.navbar nav').classList.toggle('open');
  });
</script>

</body>
</html>
